<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PickMe VPN | Secure & Kawaii</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --primary-pink: #FFB6C1;
            --dark-pink: #FF69B4;
            --text-white: #FFFFFF;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'VT323', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        header {
            padding: 50px 20px;
            text-align: center;
        }

        .logo {
            image-rendering: pixelated;
            max-width: 300px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px var(--primary-pink));
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.5rem;
            color: var(--primary-pink);
            text-shadow: 3px 3px 0px var(--dark-pink);
            margin-bottom: 40px;
        }

        /* Секция тарифов */
        .pricing {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .card {
            border: 4px solid var(--primary-pink);
            background: rgba(255, 182, 193, 0.05);
            padding: 30px;
            width: 250px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 20px var(--dark-pink);
            background: rgba(255, 182, 193, 0.1);
        }

        .card h2 {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .price {
            font-size: 2.5rem;
            color: var(--primary-pink);
            margin-bottom: 20px;
        }

        .features {
            list-style: none;
            padding: 0;
            margin-bottom: 30px;
            text-align: left;
            font-size: 1.2rem;
        }

        .features li::before {
            content: "> ";
            color: var(--primary-pink);
        }

        /* Кнопка покупки */
        .btn-buy {
            display: inline-block;
            background: var(--primary-pink);
            color: #000;
            padding: 15px 25px;
            text-decoration: none;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            border: none;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--dark-pink);
        }

        .btn-buy:active {
            box-shadow: 0px 0px 0px;
            transform: translate(4px, 4px);
        }

        footer {
            margin-top: 100px;
            padding: 40px;
            font-size: 0.8rem;
            opacity: 0.6;
        }

        /* Анимация плавающего котика */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        .floating { animation: float 4s ease-in-out infinite; }
    </style>
</head>
<body>

    <header>
        <div class="floating">
            <img src="image_793d13.png" alt="PickMe Logo" class="logo">
        </div>
        <h1>PICKME VPN</h1>
        <p style="font-size: 1.5rem;">Приватность в стиле Pixel Art.</p>
    </header>

    <section class="pricing">
        <div class="card">
            <h2>START</h2>
            <div class="price">$3</div>
            <ul class="features">
                <li>1 Месяц</li>
                <li>3 Устройства</li>
                <li>No Logs</li>
            </ul>
            <a href="#" class="btn-buy">КУПИТЬ</a>
        </div>

        <div class="card" style="border-color: #fff;">
            <h2 style="color: #fff;">PRO</h2>
            <div class="price" style="color: #fff;">$15</div>
            <ul class="features">
                <li>6 Месяцев</li>
                <li>10 Устройств</li>
                <li>Gaming Mode</li>
            </ul>
            <a href="#" class="btn-buy" style="background: #fff; box-shadow: 4px 4px 0px #ccc;">ВЫБРАТЬ</a>
        </div>

        <div class="card">
            <h2>ULTRA</h2>
            <div class="price">$25</div>
            <ul class="features">
                <li>1 Год</li>
                <li>∞ Устройств</li>
                <li>VIP Сервера</li>
            </ul>
            <a href="#" class="btn-buy">КУПИТЬ</a>
        </div>
    </section>

    <footer>
        © 2026 PICKME VPN. STAY SAFE, STAY PINK.
    </footer>

</body>
</html>
